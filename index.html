<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maria Tools – Wandertracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Wandertracker</h1>

    <div class="card">
      <h2 id="formTitle">Neue Wanderung</h2>

      <div class="form-grid">
        <div>
          <label for="date">Datum</label>
          <input type="date" id="date">
        </div>

        <div>
          <label for="km">Kilometer</label>
          <input type="number" id="km" step="0.1" min="0" placeholder="z. B. 8.5">
        </div>

        <div class="full">
          <label for="route">Route</label>
          <input type="text" id="route" placeholder="Von – Nach">
        </div>
      </div>

      <div class="button-row">
        <button onclick="saveEntry()" id="saveButton">Speichern</button>
        <button onclick="cancelEdit()" id="cancelButton" class="secondary-btn" style="display:none;">Abbrechen</button>
      </div>
    </div>

    <div class="card">
      <h2>Dashboard</h2>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Total Kilometer</div>
          <div class="stat-value" id="totalKm">0.0 km</div>
        </div>

        <div class="stat-box">
          <div class="stat-label">Anzahl Wanderungen</div>
          <div class="stat-value" id="totalEntries">0</div>
        </div>

        <div class="stat-box">
          <div class="stat-label">Ø pro Wanderung</div>
          <div class="stat-value" id="avgKm">0.0 km</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Fortschritt</h2>

      <div class="progress-block">
        <div class="progress-head">
          <span>1000 km</span>
          <span id="goal1000Text">0.0 / 1000.0 km</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="goal1000Bar"></div>
        </div>
      </div>

      <div class="progress-block">
        <div class="progress-head">
          <span>2500 km</span>
          <span id="goal2500Text">0.0 / 2500.0 km</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="goal2500Bar"></div>
        </div>
      </div>

      <div class="progress-block">
        <div class="progress-head">
          <span>5000 km</span>
          <span id="goal5000Text">0.0 / 5000.0 km</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="goal5000Bar"></div>
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2>Monatsübersicht</h2>
        <div id="monthlyOverview"></div>
      </div>

      <div class="card">
        <h2>Jahresübersicht</h2>
        <div id="yearlyOverview"></div>
      </div>
    </div>

    <div class="card">
      <h2>Einträge</h2>
      <ul id="list"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
